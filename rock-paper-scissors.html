<!DOCTYPE html>
<html>

<head>
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="rock-paper-scissors.css">
</head>

<body>

  <section class="rock-paper-scissors">
    <p class="title">Rock, Paper, Scissors ✊🖐️✌️</p>

    <div class="symbol">
      <button onclick="
playGame('rock');
" class="move-button">
        <img src="Public/rock-emoji.png" class="move-icon"> Rock
      </button>


      <button onclick="
playGame('paper');
" class="move-button">
        <img src="Public/paper-emoji.png" class="move-icon"> Paper
      </button>

      <button onclick="
playGame('scissors');
" class="move-button">
        <img src="Public/scissors-emoji.png" class="move-icon"> Scissors
      </button>
    </div>


    <p class="js-result result "></p>

    <p class="js-moves moves"></p>



    <div class="score-card">
      <p class="js-score score"></p>
    </div>



    <div class="reset-btn">
      <button onclick="
score.wins = 0;
score.losses = 0;
score.ties = 0;
localStorage.removeItem('score');
updateScoreElement();
" class="reset-score-button">Reset Score</button>


    </div>


  </section>



  <script src="rock-paper-scissors.js"></script>
</body>

</html>
